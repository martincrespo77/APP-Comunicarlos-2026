# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml — Mesa de Ayuda Comunicarlos
#
#  Decisión de base de datos: SQLite (volumen montado)
#  ─────────────────────────────────────────────────
#  Justificación para el alcance del TP (PP5):
#    - El TP es un sistema mono-instancia: un único proceso de API, sin
#      workers concurrentes que compartan estado de escritura.
#    - SQLite con un volumen Docker es suficiente para demo, corrección
#      y entrega académica sin infraestructura adicional.
#    - Elimina la necesidad de un servicio PostgreSQL separado, healthchecks
#      de DB, credenciales adicionales y espera de arranque.
#    - La arquitectura del código ya es DB-agnostic: cambiar DATABASE_URL
#      a postgres://... es el único cambio necesario si se migra.
#
#  Para producción real o si se requiere concurrencia:
#    - Reemplazar el servicio "api" por uno con PostgreSQL descomentando
#      el bloque "db" que se incluye comentado al final de este archivo.
#    - No requiere cambios en el código de la aplicación.
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime        # usa el stage final, no el builder

    # Variables de entorno: se leen del archivo .env en el mismo directorio.
    # Las variables definidas aquí sobreescriben las del .env si se repiten.
    env_file:
      - .env

    ports:
      - "8000:8000"          # host:container

    volumes:
      # Volumen nombrado para persistir la base de datos SQLite entre reinicios
      - sqlite_data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s      # da tiempo al lifespan de crear las tablas

# ─────────────────────────────────────────────────────────────────────────────
#  Volúmenes
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  sqlite_data:
    driver: local


