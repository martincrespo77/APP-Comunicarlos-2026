# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml — Mesa de Ayuda Comunicarlos
#
#  Base de datos: MongoDB 7
#  La aplicación usa MongoDB como única base de datos.
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime        # usa el stage final, no el builder

    # Variables de entorno: se leen del archivo .env en el mismo directorio.
    # Las variables definidas aquí sobreescriben las del .env si se repiten.
    env_file:
      - .env

    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: mesa_de_ayuda

    ports:
      - "8000:8000"          # host:container

    depends_on:
      mongo:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
